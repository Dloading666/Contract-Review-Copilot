<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#0053db",
                    "primary-container": "#2563eb",
                    "surface-bright": "#f7f9fb",
                    "on-surface-variant": "#434655",
                    "secondary": "#515f74",
                    "on-secondary": "#ffffff",
                    "outline": "#737686",
                    "secondary-fixed-dim": "#b9c7df",
                    "on-primary-fixed": "#00174b",
                    "on-primary-container": "#eeefff",
                    "surface-container-highest": "#e0e3e5",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-tertiary-fixed": "#360f00",
                    "background": "#f7f9fb",
                    "secondary-container": "#d5e3fc",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#eff1f3",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-low": "#f2f4f6",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-surface": "#191c1e",
                    "on-error-container": "#93000a",
                    "tertiary-fixed": "#ffdbcd",
                    "tertiary-container": "#bc4800",
                    "primary-fixed-dim": "#b4c5ff",
                    "surface": "#f7f9fb",
                    "primary-fixed": "#dbe1ff",
                    "surface-variant": "#e0e3e5",
                    "tertiary": "#943700",
                    "on-secondary-fixed": "#0d1c2e",
                    "inverse-primary": "#b4c5ff",
                    "on-background": "#191c1e",
                    "primary": "#004ac6",
                    "inverse-surface": "#2d3133",
                    "surface-dim": "#d8dadc",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "outline-variant": "#c3c6d7",
                    "secondary-fixed": "#d5e3fc",
                    "on-secondary-fixed-variant": "#3a485b",
                    "surface-container": "#eceef0",
                    "on-error": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "on-tertiary-container": "#ffede6",
                    "on-secondary-container": "#57657a",
                    "error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-5%] w-96 h-96 bg-primary-fixed opacity-20 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-secondary-fixed opacity-15 blur-[80px] rounded-full"></div>
<main class="w-full max-w-md px-6 z-10">
<!-- Brand Logo & Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-weight="fill">verified_user</span>
<span class="text-2xl font-extrabold tracking-tight text-primary">合规智审 Copilot</span>
</div>
<h1 class="text-3xl font-bold text-on-surface mb-2">免费注册</h1>
<p class="text-on-surface-variant text-sm">开启智能、合规的合同审查新纪元</p>
</div>
<!-- Registration Card -->
<div class="surface-container-lowest glass-panel rounded-xl shadow-[0_20px_50px_rgba(0,74,198,0.05)] p-8 border border-outline-variant/20">
<form class="space-y-5">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">邮箱地址</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">mail</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low border-transparent border-b-outline-variant focus:border-b-primary focus:ring-0 text-sm transition-all rounded-lg" placeholder="example@legal.com" required="" type="email"/>
</div>
</div>
<!-- Verification Code Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">邮箱验证码</label>
<div class="flex gap-2">
<div class="relative flex-grow group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">shield_person</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low border-transparent border-b-outline-variant focus:border-b-primary focus:ring-0 text-sm transition-all rounded-lg" placeholder="6位验证码" required="" type="text"/>
</div>
<button class="px-4 py-3 bg-surface-container-high text-primary font-medium text-sm rounded-lg hover:bg-secondary-container transition-colors active:scale-95 whitespace-nowrap" type="button">
                            发送验证码
                        </button>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">设置密码</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-low border-transparent border-b-outline-variant focus:border-b-primary focus:ring-0 text-sm transition-all rounded-lg" placeholder="请输入密码" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-outline hover:text-on-surface">
<span class="material-symbols-outlined text-sm">visibility_off</span>
</div>
</div>
</div>
<!-- Confirm Password Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">再次输入密码</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">lock_reset</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-low border-transparent border-b-outline-variant focus:border-b-primary focus:ring-0 text-sm transition-all rounded-lg" placeholder="请再次输入密码" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-4 bg-gradient-to-r from-primary to-primary-container text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 hover:shadow-primary/30 transform transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
                    立即注册
                </button>
<!-- Terms -->
<p class="text-[11px] text-center text-on-surface-variant mt-4 leading-relaxed">
                    点击“立即注册”即表示您同意我们的 <a class="text-primary hover:underline" href="#">服务协议</a> 和 <a class="text-primary hover:underline" href="#">隐私政策</a>
</p>
</form>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                已有账号？ <a class="text-primary font-semibold hover:underline transition-all" href="/login">立即登录</a>
</p>
</div>
</main>
<!-- Shared Footer -->
<footer class="fixed bottom-0 w-full flex justify-center gap-8 items-center py-6 px-4 font-['Inter'] text-sm tracking-wide bg-transparent">
<span class="text-slate-500 dark:text-slate-400">© 2024 Contract Review Copilot. All rights reserved.</span>
<div class="flex gap-6">
<a class="text-slate-500 dark:text-slate-400 hover:text-[#004ac6] underline transition-all transition-opacity hover:opacity-80" href="#">Terms of Service</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-[#004ac6] underline transition-all transition-opacity hover:opacity-80" href="#">Privacy Policy</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-[#004ac6] underline transition-all transition-opacity hover:opacity-80" href="#">Contact Support</a>
</div>
</footer>
<!-- Aesthetic Decorative Image (Top Right) -->
<div class="absolute top-10 right-10 hidden lg:block w-64 h-64 opacity-40">
<div class="relative w-full h-full rounded-2xl overflow-hidden shadow-2xl border border-white/40 rotate-6">
<img alt="Legal scales of justice" class="object-cover w-full h-full" data-alt="Modern close-up of brass scales of justice on a clean white desk background with soft professional studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfmV0Ky3jW8gfFM1o7YTwfdG3tkBmOFopqtWkKN5cBsVXgVhur12ZmwNijw4vDJD07d9egr6XBa6l8lfMBU-fdI4qvdY3VFF3zmGkBIYdJT26O52OkN4m9pyl6krhSL7NQ97PxKL1hoXzD4iTh3wakgGDtbQP0zyl66N_m95WNbxm6LsifOYHZ0OHOUDy76hasu5dEylVsS5WkTF-bQOef9osa9Yc4wte427yRGEhEoFhDQMMdPt__5cEcfeJ-1V92IhwIxKncG3o"/>
</div>
</div>
<!-- Aesthetic Decorative Image (Bottom Left) -->
<div class="absolute bottom-10 left-10 hidden lg:block w-72 h-48 opacity-40">
<div class="relative w-full h-full rounded-2xl overflow-hidden shadow-2xl border border-white/40 -rotate-3">
<img alt="Legal documents and pen" class="object-cover w-full h-full" data-alt="Abstract minimalist shot of organized legal documents on a glass table with premium blue and white ambient lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYAhMyyQYOVBRW4h1sjAHCNGfBxrFZg8zUL7qaKOX6L-58T8es6Ilb4Yus-TW_keFiX8ga-SQaXPJizkxGKV5V2ucrogO2NzeRB5XSYF5X3YhQxu3U9_wfh_lJGzDUtt98QRKtlor_z24Yo-tb4csxvaetCZLRS76X9HJEq95oigAsEGxS2m1_wiqMSTBIY5nhxnD1QV1oTgKqdtBmxmuFdFOculhgZ9DYtynAnY7FYuDY-qUJy7pPugfYqCkEsu0NGlRLo03dhK0"/>
</div>
</div>
</body></html>

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: contract_review
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U contract_user -d contract_review']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['sh', '-c', 'redis-server --requirepass "$REDIS_PASSWORD"']
    ports:
      - '6379:6379'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://contract_user:${POSTGRES_PASSWORD}@postgres:5432/contract_review
      - AUTO_SEED_LEGAL_KNOWLEDGE=1
      - PADDLE_PDX_MODEL_SOURCE=BOS
      - REDIS_ENABLED=true
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRET_FILE=/app/data/jwt_secret
      - ALLOW_DEV_CODE_RESPONSE=${ALLOW_DEV_CODE_RESPONSE:-false}
      - HTTP_PROXY=${BACKEND_HTTP_PROXY:-}
      - HTTPS_PROXY=${BACKEND_HTTPS_PROXY:-}
      - ALL_PROXY=${BACKEND_ALL_PROXY:-}
      - NO_PROXY=${BACKEND_NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      - OCR_API_KEY=${OCR_API_KEY:-}
      - OCR_BASE_URL=${OCR_BASE_URL:-https://api.siliconflow.cn/v1}
      - OCR_MODEL=PaddlePaddle/PaddleOCR-VL-1.5
      - OPENAI_API_KEY=sk-fhqbknokfwhselfchqjhsumfkwcwrhltmwujswbindgviwzs
      - OPENAI_BASE_URL=https://api.siliconflow.cn/v1
      - REVIEW_MODEL=Qwen/Qwen3.5-4B
      - EMBEDDING_API_KEY=sk-6d78e7ff5e3d4b2d90329744b852e558
      - EMBEDDING_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - EMBEDDING_MODEL=text-embedding-v4

    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
  backend_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: contract_review
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: contract_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U contract_user -d contract_review']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://contract_user:contract_pass@postgres:5432/contract_review
      - AUTO_SEED_LEGAL_KNOWLEDGE=1
      - PADDLE_PDX_MODEL_SOURCE=BOS
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - PRIMARY_LLM_MODEL_KEY=kimi
      - GEMMA4_BASE_URL=http://host.docker.internal:11434/v1
      - GEMMA4_MODEL=contract-gemma4:latest
      - SKIP_LLM_EXTRACTION=0
      - SKIP_LLM_ROUTING=0
      - SKIP_LLM_REVIEW=0
      - SKIP_LLM_REPORT=0
    env_file:
      - ./backend/.env
    restart: unless-stopped

volumes:
  postgres_data:
